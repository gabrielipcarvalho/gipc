name: core image

on:
  push:
    # sprint/m3-telemetry is included ONLY so the sprint can build the amd64 image from the branch
    # (a branch-only workflow can't use workflow_dispatch). Narrow to [main] before merging to main.
    branches: [main, sprint/m3-telemetry]
    paths:
      - "services/core/**"
      - ".github/workflows/core.yml"

concurrency:
  group: core-image
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/gabrielipcarvalho/gipc-core

jobs:
  build:
    runs-on: ubuntu-latest   # amd64 — matches garuda
    permissions:
      contents: write     # to commit the GitOps tag bump
      packages: write     # to push to GHCR
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Vet & test (authoritative — no local go on the dev machine)
        working-directory: services/core
        run: |
          go vet ./...
          go test ./...

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: services/core
          file: services/core/Dockerfile
          push: true
          build-args: |
            VERSION=${{ github.sha }}
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: GitOps — pin manifest to this image (deploy feed)
        run: |
          sed -i "s|newTag: .*|newTag: \"${GITHUB_SHA}\"|" infra/k8s/core/kustomization.yaml
          if git diff --quiet; then echo "no manifest change"; exit 0; fi
          git config user.name  "gipc-ci"
          git config user.email "ci@gipc.dev"
          git commit -am "deploy(core): ${GITHUB_SHA:0:7} → gipc.dev [skip ci]"
          git push
