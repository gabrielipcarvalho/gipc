<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="gipc.dev arcane operator mark">
  <defs>
    <linearGradient id="arc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b18cff"/>
      <stop offset="1" stop-color="#34e6ff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- hex sigil -->
  <path d="M64 8l48.5 28v56L64 120 15.5 92V36z" fill="#0a0a12" stroke="url(#arc)" stroke-width="3"/>
  <path d="M64 8l48.5 28v56L64 120 15.5 92V36z" fill="none" stroke="#b18cff" stroke-width="3" opacity="0.25"/>
  <!-- prompt chevron + cursor -->
  <g filter="url(#glow)">
    <path d="M45 50l17 14-17 14" fill="none" stroke="#34e6ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="68" y="73" width="22" height="6" rx="3" fill="#b18cff"/>
  </g>
</svg>
