apiVersion: v1
kind: Namespace
metadata:
  name: gipc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: holding
  namespace: gipc
spec:
  replicas: 1
  selector:
    matchLabels: {app: holding}
  template:
    metadata:
      labels: {app: holding}
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - {name: web, mountPath: /usr/share/nginx/html, readOnly: true}
      volumes:
        - name: web
          configMap: {name: holding}   # created from k3s/holding-index.html (see README)
---
apiVersion: v1
kind: Service
metadata:
  name: holding
  namespace: gipc
spec:
  type: NodePort
  selector: {app: holding}
  ports:
    - {port: 80, targetPort: 80, nodePort: 30080}
