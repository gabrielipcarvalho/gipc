<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>gipc.dev</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap');
:root{--bg:#0a0910;--ink:#e6e1f2;--violet:#a855f7;--cyan:#22d3ee;--dim:#6b6480}
*{margin:0;box-sizing:border-box}
html,body{height:100%}
body{background:radial-gradient(1200px 600px at 50% -10%,#160f27 0%,var(--bg) 60%);color:var(--ink);
font-family:'IBM Plex Mono',ui-monospace,monospace;display:grid;place-items:center;min-height:100vh;padding:2rem}
.wrap{text-align:center;max-width:44rem}
.sigil{width:96px;height:96px;margin:0 auto 1.6rem;filter:drop-shadow(0 0 14px rgba(168,85,247,.55))}
h1{font-size:clamp(2rem,7vw,3.4rem);font-weight:600;letter-spacing:.06em}
h1 .v{color:var(--violet)} h1 .c{color:var(--cyan)}
.tag{margin-top:.9rem;color:var(--dim);font-size:clamp(.8rem,2.4vw,1rem);letter-spacing:.18em;text-transform:uppercase}
.line{margin-top:2.2rem;color:var(--cyan);font-size:clamp(.85rem,2.6vw,1.05rem)}
.cur{display:inline-block;width:.62ch;height:1.15em;background:var(--cyan);vertical-align:-0.2em;margin-left:.15ch;animation:b 1.05s steps(1) infinite}
@keyframes b{50%{opacity:0}}
.foot{margin-top:2.6rem;color:var(--dim);font-size:.72rem;letter-spacing:.14em}
</style></head>
<body><div class="wrap">
<svg class="sigil" viewBox="0 0 100 100" fill="none" stroke="url(#g)" stroke-width="2.5">

<polygon points="50,6 88,28 88,72 50,94 12,72 12,28"/>
<polygon points="50,24 72,37 72,63 50,76 28,63 28,37"/>
<path d="M50 24V76 M28 37l44 26 M72 37L28 63"/></svg>

<div class="tag">arcane systems &middot; software engineering</div>
<div class="line">summoning the site<span class="cur"></span></div>

</div></body></html>
