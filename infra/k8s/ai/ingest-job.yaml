# Corpus ingest Job — NOT in kustomization.yaml (completed Jobs are immutable). Run imperatively with
# the CI-pinned tag substituted:
#   TAG=$(grep newTag infra/k8s/ai/kustomization.yaml | sed 's/.*"\(.*\)"/\1/')
#   sed "s|IMAGE_TAG|${TAG}|" ingest-job.yaml | kubectl apply -f -
#   (delete the old job first: kubectl -n gipc delete job ingest --ignore-not-found)
apiVersion: batch/v1
kind: Job
metadata:
  name: ingest
  namespace: gipc
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels: { app: ingest }
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: ingest
          image: ghcr.io/gabrielipcarvalho/gipc-ai:IMAGE_TAG
          command: ["python", "-m", "app.ingest"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: ai-secrets, key: database-url }
          resources:   # batch job: embeds the FULL corpus in one pass (62 chunks incl. 36 code
            # excerpts since Sprint G) — needs more headroom than the serving pod; transient (<1min)
            requests: { cpu: 200m, memory: 512Mi }
            limits: { cpu: "1", memory: 1536Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: {}
