apiVersion: v1
kind: ConfigMap
metadata:
  name: caddy-config
  namespace: gipc
data:
  Caddyfile: |
    {
      auto_https off
      admin off
      servers {
        trusted_proxies static private_ranges   # trust cloudflared → preserve X-Forwarded-Proto/For
      }
    }
    :80 {
      handle /caddy-health { respond 200 }              # upstream-independent readiness target
      handle /api/telemetry { reverse_proxy web:80 }    # v1 stub — SystemDash polls it; keep on web until P3
      handle /api/* { reverse_proxy core:8080 }
      handle { reverse_proxy web:80 }
      header -Server
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: caddy
  namespace: gipc
  labels: { app: caddy }
spec:
  replicas: 1
  selector:
    matchLabels: { app: caddy }
  template:
    metadata:
      labels: { app: caddy }
    spec:
      securityContext:
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: caddy
          image: caddy:2.8-alpine   # pinned INLINE (not in kustomization images:) so CI's sed can't touch it
          ports:
            - { containerPort: 80, name: http }
          readinessProbe:
            httpGet: { path: /caddy-health, port: 80 }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /caddy-health, port: 80 }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits: { cpu: 150m, memory: 128Mi }
          securityContext:
            allowPrivilegeEscalation: false   # runs root for :80 bind + /data,/config writes — lighter than core
          volumeMounts:
            - { name: config, mountPath: /etc/caddy }
      volumes:
        - name: config
          configMap: { name: caddy-config }
---
apiVersion: v1
kind: Service
metadata:
  name: caddy
  namespace: gipc
  labels: { app: caddy }
spec:
  type: NodePort
  selector: { app: caddy }
  ports:
    - { port: 80, targetPort: 80, nodePort: 30082, name: http }
