# Grafana — provisioned datasources (Prometheus + Loki) + one starter dashboard.
# Admin password from the imperative `grafana-admin` Secret (never committed). Not publicly exposed (P6).
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: observability
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        uid: prometheus
        isDefault: true
      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
        uid: loki
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: observability
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: gipc
        orgId: 1
        folder: ''
        type: file
        disableDeletion: true
        editable: false
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-gipc
  namespace: observability
data:
  gipc-system.json: |
    {
      "annotations": { "list": [] },
      "editable": false,
      "panels": [
        {
          "type": "timeseries", "title": "Node CPU %", "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [ { "expr": "100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[1m])) * 100)", "refId": "A" } ]
        },
        {
          "type": "timeseries", "title": "Node memory used %", "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [ { "expr": "100 * (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)", "refId": "A" } ]
        },
        {
          "type": "timeseries", "title": "web pod memory (cAdvisor)", "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [ { "expr": "container_memory_working_set_bytes{pod=~\"web.*\",container=\"web\"}", "refId": "A" } ]
        },
        {
          "type": "timeseries", "title": "req/s (populates in P3)", "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [ { "expr": "sum(rate(http_requests_total[1m]))", "refId": "A" } ]
        }
      ],
      "schemaVersion": 39,
      "time": { "from": "now-1h", "to": "now" },
      "templating": { "list": [] },
      "title": "gipc — system",
      "uid": "gipc-system",
      "version": 1
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: observability
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: observability
  labels: { app: grafana }
spec:
  replicas: 1
  strategy: { type: Recreate }   # RWO PVC on one node — avoid grafana.db (SQLite) lock/corruption
  selector:
    matchLabels: { app: grafana }
  template:
    metadata:
      labels: { app: grafana }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:11.1.0
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef: { name: grafana-admin, key: admin-password }
            - { name: GF_AUTH_ANONYMOUS_ENABLED, value: "false" }
            - { name: GF_USERS_ALLOW_SIGN_UP, value: "false" }
            - { name: GF_ANALYTICS_REPORTING_ENABLED, value: "false" }
            - { name: GF_ANALYTICS_CHECK_FOR_UPDATES, value: "false" }
          ports:
            - { containerPort: 3000, name: http }
          readinessProbe:
            httpGet: { path: /api/health, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: 3000 }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 200m, memory: 256Mi }
          volumeMounts:
            - { name: datasources, mountPath: /etc/grafana/provisioning/datasources }
            - { name: dashboards-provider, mountPath: /etc/grafana/provisioning/dashboards }
            - { name: dashboard-gipc, mountPath: /var/lib/grafana/dashboards }
            - { name: data, mountPath: /var/lib/grafana }
      volumes:
        - { name: datasources, configMap: { name: grafana-datasources } }
        - { name: dashboards-provider, configMap: { name: grafana-dashboards-provider } }
        - { name: dashboard-gipc, configMap: { name: grafana-dashboard-gipc } }
        - { name: data, persistentVolumeClaim: { claimName: grafana-data } }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: observability
  labels: { app: grafana }
spec:
  type: ClusterIP
  selector: { app: grafana }
  ports:
    - { port: 3000, targetPort: 3000, name: http }
