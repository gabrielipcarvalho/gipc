# Loki 3.0 single-binary, filesystem storage, compactor-enforced 7d retention.
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: observability
data:
  loki.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
      grpc_listen_port: 9095
      log_level: warn
    common:
      instance_addr: 127.0.0.1
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    limits_config:
      retention_period: 168h          # 7d
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      volume_enabled: true
    compactor:
      working_directory: /loki/compactor
      retention_enabled: true          # enforce retention (3.0 needs the compactor)
      delete_request_store: filesystem
    analytics:
      reporting_enabled: false
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-data
  namespace: observability
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: observability
  labels: { app: loki }
spec:
  replicas: 1
  strategy: { type: Recreate }   # RWO PVC on one node — avoid index lock contention
  selector:
    matchLabels: { app: loki }
  template:
    metadata:
      labels: { app: loki }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: loki
          image: grafana/loki:3.0.0
          args: ["-config.file=/etc/loki/loki.yaml"]
          ports:
            - { containerPort: 3100, name: http }
          readinessProbe:
            httpGet: { path: /ready, port: 3100 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /ready, port: 3100 }
            initialDelaySeconds: 120   # tolerate slow WAL replay on restart (readiness gates traffic)
            periodSeconds: 20
            failureThreshold: 6
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 300m, memory: 256Mi }
          volumeMounts:
            - { name: config, mountPath: /etc/loki }
            - { name: data, mountPath: /loki }
      volumes:
        - name: config
          configMap: { name: loki-config }
        - name: data
          persistentVolumeClaim: { claimName: loki-data }
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: observability
  labels: { app: loki }
spec:
  type: ClusterIP
  selector: { app: loki }
  ports:
    - { port: 3100, targetPort: 3100, name: http }
