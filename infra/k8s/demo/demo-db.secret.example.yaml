# SHAPE ONLY — NOT in kustomization.yaml (never applied). Re-applying over a live DB would NOT
# rotate the running database's passwords (initdb only runs on a fresh emptyDir) — rotation =
# recreate BOTH secrets (this one + gipc/demo-db-url with the same ro-password), then delete the
# demo-db pod (reseed) and restart core. The real Secret is created imperatively on garuda:
#   ssh garuda 'set -e; SUPW=$(openssl rand -hex 24); PW=$(openssl rand -hex 16); \
#     kubectl -n demo create secret generic demo-db \
#       --from-literal=password="$SUPW" --from-literal=ro-password="$PW"; \
#     kubectl -n gipc create secret generic demo-db-url \
#       --from-literal=url="postgres://demo_ro:$PW@demo-db.demo.svc:5432/demo?sslmode=disable&connect_timeout=2"'
apiVersion: v1
kind: Secret
metadata:
  name: demo-db
  namespace: demo
type: Opaque
stringData:
  password: CHANGEME      # postgres superuser (initdb only; nothing else uses it)
  ro-password: CHANGEME   # demo_ro — the ONLY role core's explorer logs in as
