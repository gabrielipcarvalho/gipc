# SHAPE ONLY — never applied from the repo. The DSN embeds demo_ro's password, so it lives in an
# IMPERATIVE Secret (created together with demo/demo-db — see demo-db.secret.example.yaml for the
# one-block command). sslmode=disable: in-cluster, no TLS (lib/pq hard-fails without the flag);
# connect_timeout=2: DB-down fails fast inside core's 3s handler budget. The ref in core.yaml is
# `optional: true` — a missing Secret must never block core's boot (boot independence).
apiVersion: v1
kind: Secret
metadata:
  name: demo-db-url
  namespace: gipc
type: Opaque
stringData:
  url: postgres://demo_ro:CHANGEME@demo-db.demo.svc:5432/demo?sslmode=disable&connect_timeout=2
