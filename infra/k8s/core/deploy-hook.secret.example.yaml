# EXAMPLE ONLY — shape of the deploy-hook Secret (the HMAC key for /api/hooks/deploy).
# Never commit a real key. The REAL Secret is created imperatively on garuda:
#   key=$(openssl rand -hex 32)
#   kubectl -n gipc create secret generic deploy-hook --from-literal=hmac="$key" \
#     --dry-run=client -o yaml | kubectl apply -f -
# The SAME value goes into the GitHub Actions secret DEPLOY_HOOK_KEY (gh secret set).
# Not in kustomization.yaml (never applied).
apiVersion: v1
kind: Secret
metadata:
  name: deploy-hook
  namespace: gipc
type: Opaque
stringData:
  hmac: CHANGEME
