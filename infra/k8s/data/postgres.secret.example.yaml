# SHAPE ONLY — NOT in kustomization.yaml (never applied). Applying this over the live Secret would
# silently break the DSN (the running DB keeps its initdb-time password). The real Secret is created
# imperatively on garuda and NEVER committed:
#   kubectl create ns data
#   kubectl -n data create secret generic postgres --from-literal=password=$(openssl rand -hex 24)
apiVersion: v1
kind: Secret
metadata:
  name: postgres
  namespace: data
type: Opaque
stringData:
  password: CHANGEME
