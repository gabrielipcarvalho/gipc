apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gipc-web
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:gabrielipcarvalho/gipc.git
    targetRevision: main
    path: infra/k8s/web
  destination:
    server: https://kubernetes.default.svc
    namespace: gipc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff: { duration: 10s, factor: 2, maxDuration: 2m }
