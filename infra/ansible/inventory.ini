; garuda — the single-node k3s server that hosts gipc.dev.
; Provisioning is codify/CHECK-ONLY: the box is already built. Run only with --check (dry-run).
; Set ansible_host to garuda's reachable address (or use an SSH alias) before running --check.
[gipc_servers]
garuda ansible_host=garuda ansible_user=arcane

[gipc_servers:vars]
ansible_python_interpreter=/usr/bin/python3
